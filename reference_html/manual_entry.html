<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add Ingredient</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Public Sans', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light text-background-dark min-h-screen font-display">
<!-- Focused View Header (Back Button + Save) -->
<header class="flex items-center justify-between p-4 bg-white shadow-sm border-b border-gray-200">
<button class="flex items-center justify-center w-10 h-10 text-background-dark hover:bg-gray-100 rounded-full transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="text-lg font-bold">Add Ingredient</h1>
<button class="text-primary font-bold px-4 py-2 hover:bg-primary/10 rounded-lg transition-colors">Save</button>
</header>
<main class="max-w-md mx-auto p-4 space-y-6">
<!-- Product Name Input -->
<div class="space-y-2">
<label class="block text-sm font-medium text-gray-700" for="product-name">Product Name</label>
<input class="w-full h-14 px-4 rounded-xl border border-gray-300 bg-white focus:ring-2 focus:ring-primary focus:border-primary transition-all text-base" id="product-name" placeholder="e.g. Fresh Milk" type="text"/>
</div>
<!-- Emoji Selection Bar -->
<div class="space-y-2">
<label class="block text-sm font-medium text-gray-700">Choose an Icon</label>
<div class="flex gap-3 overflow-x-auto pb-2 hide-scrollbar -mx-4 px-4 sm:mx-0 sm:px-0">
<!-- Selected State -->
<button class="flex h-12 w-12 shrink-0 items-center justify-center rounded-xl bg-primary/20 border-2 border-primary text-2xl transition-transform active:scale-95">🥛</button>
<!-- Unselected States -->
<button class="flex h-12 w-12 shrink-0 items-center justify-center rounded-xl bg-white border border-gray-200 text-2xl hover:bg-gray-50 transition-colors">🍎</button>
<button class="flex h-12 w-12 shrink-0 items-center justify-center rounded-xl bg-white border border-gray-200 text-2xl hover:bg-gray-50 transition-colors">🥦</button>
<button class="flex h-12 w-12 shrink-0 items-center justify-center rounded-xl bg-white border border-gray-200 text-2xl hover:bg-gray-50 transition-colors">🥚</button>
<button class="flex h-12 w-12 shrink-0 items-center justify-center rounded-xl bg-white border border-gray-200 text-2xl hover:bg-gray-50 transition-colors">🍗</button>
<button class="flex h-12 w-12 shrink-0 items-center justify-center rounded-xl bg-white border border-gray-200 text-2xl hover:bg-gray-50 transition-colors">🍞</button>
<button class="flex h-12 w-12 shrink-0 items-center justify-center rounded-xl bg-white border border-gray-200 text-2xl hover:bg-gray-50 transition-colors">🧀</button>
<button class="flex h-12 w-12 shrink-0 items-center justify-center rounded-xl bg-white border border-gray-200 text-2xl hover:bg-gray-50 transition-colors">🥩</button>
</div>
<style>
                .hide-scrollbar::-webkit-scrollbar { display: none; }
                .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
            </style>
</div>
<!-- Details Grid -->
<div class="grid grid-cols-2 gap-4">
<!-- Quantity -->
<div class="space-y-2">
<label class="block text-sm font-medium text-gray-700" for="quantity">Quantity</label>
<div class="flex items-center border border-gray-300 rounded-xl bg-white overflow-hidden focus-within:ring-2 focus-within:ring-primary focus-within:border-primary">
<button class="px-3 py-2 text-gray-500 hover:bg-gray-100 transition-colors">
<span class="material-symbols-outlined">remove</span>
</button>
<input class="w-full text-center border-none focus:ring-0 p-2 text-base" id="quantity" min="1" type="number" value="1"/>
<button class="px-3 py-2 text-gray-500 hover:bg-gray-100 transition-colors">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
<!-- Unit (Optional) -->
<div class="space-y-2">
<label class="block text-sm font-medium text-gray-700" for="unit">Unit</label>
<select class="w-full h-[42px] px-3 rounded-xl border border-gray-300 bg-white focus:ring-2 focus:ring-primary focus:border-primary text-base text-background-dark appearance-none" id="unit">
<option value="pcs">Pieces</option>
<option value="kg">kg</option>
<option value="g">g</option>
<option selected="" value="l">Liters</option>
<option value="ml">ml</option>
<option value="pack">Pack</option>
</select>
</div>
</div>
<!-- Expiration Date -->
<div class="space-y-2 pt-2">
<label class="block text-sm font-medium text-gray-700" for="expiry">Expiration Date (Optional)</label>
<div class="relative">
<input class="w-full h-14 pl-12 pr-4 rounded-xl border border-gray-300 bg-white focus:ring-2 focus:ring-primary focus:border-primary text-base text-gray-600 appearance-none" id="expiry" type="date"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none">calendar_today</span>
</div>
</div>
<!-- Category -->
<div class="space-y-2 pt-2">
<label class="block text-sm font-medium text-gray-700" for="category">Category</label>
<div class="relative">
<select class="w-full h-14 pl-12 pr-10 rounded-xl border border-gray-300 bg-white focus:ring-2 focus:ring-primary focus:border-primary text-base text-background-dark appearance-none" id="category">
<option selected="" value="dairy">Dairy &amp; Eggs</option>
<option value="produce">Produce</option>
<option value="meat">Meat &amp; Seafood</option>
<option value="pantry">Pantry</option>
<option value="frozen">Frozen</option>
</select>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none">category</span>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none">expand_more</span>
</div>
</div>
<!-- Location in Kitchen -->
<div class="space-y-3 pt-4">
<p class="block text-sm font-medium text-gray-700">Store In</p>
<div class="flex gap-3">
<label class="flex-1">
<input checked="" class="peer sr-only" name="location" type="radio" value="fridge"/>
<div class="p-3 text-center border border-gray-200 rounded-xl cursor-pointer peer-checked:border-primary peer-checked:bg-primary/10 peer-checked:text-primary transition-all bg-white text-gray-600 font-medium text-sm flex flex-col items-center gap-1">
<span class="material-symbols-outlined">kitchen</span>
                        Fridge
                    </div>
</label>
<label class="flex-1">
<input class="peer sr-only" name="location" type="radio" value="freezer"/>
<div class="p-3 text-center border border-gray-200 rounded-xl cursor-pointer peer-checked:border-primary peer-checked:bg-primary/10 peer-checked:text-primary transition-all bg-white text-gray-600 font-medium text-sm flex flex-col items-center gap-1">
<span class="material-symbols-outlined">ac_unit</span>
                        Freezer
                    </div>
</label>
<label class="flex-1">
<input class="peer sr-only" name="location" type="radio" value="pantry"/>
<div class="p-3 text-center border border-gray-200 rounded-xl cursor-pointer peer-checked:border-primary peer-checked:bg-primary/10 peer-checked:text-primary transition-all bg-white text-gray-600 font-medium text-sm flex flex-col items-center gap-1">
<span class="material-symbols-outlined">inventory_2</span>
                        Pantry
                    </div>
</label>
</div>
</div>
<!-- Primary Action -->
<div class="pt-8 pb-12">
<button class="w-full h-14 bg-primary text-white font-bold rounded-xl shadow-md hover:bg-primary/90 transition-colors flex items-center justify-center gap-2 active:scale-[0.98]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add_circle</span>
                Add to Fridge
            </button>
</div>
</main>
</body></html>
