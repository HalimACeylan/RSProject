<!DOCTYPE html>

<style>
        .bottom-sheet {
            transform: translateY(100%);
            animation: slideUp 0.3s ease-out forwards;
        }
        @keyframes slideUp {
            to { transform: translateY(0); }
        }
    </style>

    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background min-h-screen font-body-md text-body-md relative antialiased">
<!-- Dimmed Background Overlay -->
<div class="fixed inset-0 bg-on-background/40 z-40"></div>
<!-- Bottom Sheet Container -->
<div class="fixed inset-x-0 bottom-0 z-50 flex flex-col justify-end pointer-events-none md:items-center">
<!-- Bottom Sheet Content -->
<div class="bottom-sheet pointer-events-auto bg-surface w-full md:w-[480px] rounded-t-[32px] md:rounded-b-[32px] md:mb-margin-desktop shadow-2xl flex flex-col max-h-[795px]">
<!-- Handle (Mobile only) -->
<div class="w-full flex justify-center py-3 md:hidden">
<div class="w-12 h-1.5 bg-surface-variant rounded-full"></div>
</div>
<div class="px-margin-mobile md:px-margin-desktop pt-2 pb-6 flex-1 overflow-y-auto">
<!-- Header & Progress -->
<div class="mb-stack-lg">
<div class="flex items-center justify-between mb-stack-sm">
<span class="font-label-sm text-label-sm text-text-secondary uppercase tracking-wider">Step 3 of 3</span>
<button class="w-8 h-8 flex items-center justify-center rounded-full bg-surface-container-low text-on-surface hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
</div>
<div class="flex gap-2 mb-stack-md">
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<div class="h-1 flex-1 bg-primary rounded-full"></div>
</div>
<h2 class="font-headline-md text-headline-md text-on-surface">Dietary Choices</h2>
<p class="text-text-secondary mt-1">Personalize your recipe suggestions based on your diet and allergies.</p>
</div>
<!-- Diet Selection -->
<div class="mb-stack-lg">
<h3 class="font-headline-sm text-headline-sm text-on-surface mb-stack-sm">Main Diet</h3>
<div class="flex flex-col gap-3">
<label class="flex items-center justify-between p-4 rounded-xl border border-border bg-surface cursor-pointer hover:bg-surface-container-low transition-colors">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-text-secondary" style="font-variation-settings: 'FILL' 0;">restaurant</span>
<span class="font-headline-sm text-headline-sm text-on-surface">Standard</span>
</div>
<input class="w-5 h-5 text-primary border-border focus:ring-primary focus:ring-offset-0" name="diet" type="radio"/>
</label>
<label class="flex items-center justify-between p-4 rounded-xl border-2 border-primary bg-surface-bright cursor-pointer transition-colors relative overflow-hidden">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">eco</span>
<span class="font-headline-sm text-headline-sm text-on-surface">Vegetarian</span>
</div>
<div class="w-5 h-5 rounded-full bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-white text-[14px]" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<input checked="" class="hidden" name="diet" type="radio"/>
</label>
<label class="flex items-center justify-between p-4 rounded-xl border border-border bg-surface cursor-pointer hover:bg-surface-container-low transition-colors">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-text-secondary" style="font-variation-settings: 'FILL' 0;">nutrition</span>
<span class="font-headline-sm text-headline-sm text-on-surface">Vegan</span>
</div>
<input class="w-5 h-5 text-primary border-border focus:ring-primary focus:ring-offset-0" name="diet" type="radio"/>
</label>
</div>
</div>
<!-- Allergies -->
<div class="mb-stack-lg">
<h3 class="font-headline-sm text-headline-sm text-on-surface mb-stack-sm">Allergies</h3>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full border border-border bg-surface text-on-surface font-label-sm text-label-sm hover:bg-surface-container-low transition-colors">Peanuts</button>
<button class="px-4 py-2 rounded-full border border-primary bg-primary-container/20 text-primary font-label-sm text-label-sm flex items-center gap-1 transition-colors">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">check</span>
                            Tree Nuts
                        </button>
<button class="px-4 py-2 rounded-full border border-border bg-surface text-on-surface font-label-sm text-label-sm hover:bg-surface-container-low transition-colors">Soy</button>
<button class="px-4 py-2 rounded-full border border-border bg-surface text-on-surface font-label-sm text-label-sm hover:bg-surface-container-low transition-colors">Eggs</button>
<button class="px-4 py-2 rounded-full border border-primary bg-primary-container/20 text-primary font-label-sm text-label-sm flex items-center gap-1 transition-colors">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">check</span>
                            Fish
                        </button>
<button class="px-4 py-2 rounded-full border border-border bg-surface text-on-surface font-label-sm text-label-sm hover:bg-surface-container-low transition-colors">Shellfish</button>
<button class="px-4 py-2 rounded-full border border-border bg-surface text-on-surface font-label-sm text-label-sm hover:bg-surface-container-low transition-colors border-dashed text-text-secondary flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">add</span>
                            Other
                        </button>
</div>
</div>
<!-- Ingredient Exclusions -->
<div class="mb-stack-lg">
<h3 class="font-headline-sm text-headline-sm text-on-surface mb-stack-sm">Reduce / Exclude</h3>
<div class="grid grid-cols-2 gap-3">
<label class="flex items-center gap-3 p-3 rounded-xl border border-border bg-surface cursor-pointer hover:bg-surface-container-low transition-colors">
<input checked="" class="w-5 h-5 text-primary rounded border-border focus:ring-primary focus:ring-offset-0" type="checkbox"/>
<span class="font-body-md text-body-md text-on-surface">Sugar</span>
</label>
<label class="flex items-center gap-3 p-3 rounded-xl border border-border bg-surface cursor-pointer hover:bg-surface-container-low transition-colors">
<input class="w-5 h-5 text-primary rounded border-border focus:ring-primary focus:ring-offset-0" type="checkbox"/>
<span class="font-body-md text-body-md text-on-surface">Salt</span>
</label>
<label class="flex items-center gap-3 p-3 rounded-xl border border-border bg-surface cursor-pointer hover:bg-surface-container-low transition-colors">
<input checked="" class="w-5 h-5 text-primary rounded border-border focus:ring-primary focus:ring-offset-0" type="checkbox"/>
<span class="font-body-md text-body-md text-on-surface">Gluten</span>
</label>
<label class="flex items-center gap-3 p-3 rounded-xl border border-border bg-surface cursor-pointer hover:bg-surface-container-low transition-colors">
<input class="w-5 h-5 text-primary rounded border-border focus:ring-primary focus:ring-offset-0" type="checkbox"/>
<span class="font-body-md text-body-md text-on-surface">Lactose</span>
</label>
</div>
</div>
</div>
<!-- Sticky Footer Action -->
<div class="px-margin-mobile md:px-margin-desktop py-4 bg-surface border-t border-border rounded-b-[32px]">
<button class="w-full bg-primary text-on-primary font-headline-sm text-headline-sm py-4 rounded-xl shadow-md hover:bg-on-primary-fixed-variant transition-colors flex items-center justify-center gap-2">
                    Finish Setup
                    <span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</div>
</div>
</div>
